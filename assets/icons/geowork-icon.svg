<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1890ff"/>
      <stop offset="100%" stop-color="#722ed1"/>
    </linearGradient>
    <linearGradient id="globe" x1="40" y1="20" x2="88" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#e6f7ff" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <!-- 地球外圈 -->
  <circle cx="64" cy="60" r="36" fill="none" stroke="url(#globe)" stroke-width="2.5" opacity="0.9"/>

  <!-- 经线 -->
  <ellipse cx="64" cy="60" rx="14" ry="36" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="64" cy="60" rx="28" ry="36" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>

  <!-- 纬线 -->
  <ellipse cx="64" cy="42" rx="32" ry="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="64" cy="60" rx="36" ry="10" fill="none" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <ellipse cx="64" cy="78" rx="32" ry="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>

  <!-- 大陆轮廓简化 -->
  <path d="M52 38 Q56 34 62 36 Q66 38 64 42 Q60 44 54 42 Q50 40 52 38Z" fill="white" opacity="0.5"/>
  <path d="M70 50 Q78 48 82 54 Q84 60 78 64 Q72 62 68 56 Q66 52 70 50Z" fill="white" opacity="0.5"/>
  <path d="M46 58 Q50 54 56 56 Q58 62 54 68 Q48 70 44 66 Q42 62 46 58Z" fill="white" opacity="0.5"/>
  <path d="M72 72 Q76 68 80 70 Q82 76 78 80 Q74 78 72 74 Q70 72 72 72Z" fill="white" opacity="0.4"/>

  <!-- 定位标记 -->
  <circle cx="64" cy="60" r="4" fill="#52c41a" opacity="0.9"/>
  <circle cx="64" cy="60" r="6" fill="none" stroke="#52c41a" stroke-width="1.5" opacity="0.5"/>
  <circle cx="64" cy="60" r="9" fill="none" stroke="#52c41a" stroke-width="1" opacity="0.3"/>

  <!-- 卫星轨道 -->
  <ellipse cx="64" cy="60" rx="42" ry="16" fill="none" stroke="white" stroke-width="1" opacity="0.3" stroke-dasharray="4 3" transform="rotate(-30 64 60)"/>

  <!-- 文字 G -->
  <text x="64" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="18" fill="white" opacity="0.95">GeoWork</text>
</svg>
