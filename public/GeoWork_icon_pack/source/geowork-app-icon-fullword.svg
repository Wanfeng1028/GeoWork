    <rect x="361" y="542" width="62" height="62" rx="18" fill="#0C2433" stroke="#8BFFE2" stroke-width="6"/>
    <rect x="481" y="522" width="62" height="62" rx="18" fill="#102D3A" stroke="#E9F7FF" stroke-width="6"/>
    <rect x="601" y="542" width="62" height="62" rx="18" fill="#0C2433" stroke="#F2D680" stroke-width="6"/>
    <circle cx="512" cy="553" r="11" fill="#8BFFE2"/>
