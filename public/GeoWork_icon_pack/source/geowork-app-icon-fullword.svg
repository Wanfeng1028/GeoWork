  <!-- Globe + AI route mark -->
  <g filter="url(#softGlow)">
    <circle cx="512" cy="402" r="222" fill="url(#globeFill)" stroke="url(#lineGrad)" stroke-width="7"/>
    <ellipse cx="512" cy="402" rx="222" ry="74" fill="none" stroke="#9FFFE9" stroke-width="3.5" opacity="0.72"/>
    <ellipse cx="512" cy="402" rx="74" ry="222" fill="none" stroke="#9FFFE9" stroke-width="3.5" opacity="0.50"/>
    <path d="M304 402H720" stroke="#9FFFE9" stroke-width="3.2" opacity="0.40"/>
