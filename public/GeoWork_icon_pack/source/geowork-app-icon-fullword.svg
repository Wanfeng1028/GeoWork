      <path d="M130 184H896M130 270H896M130 356H896M130 442H896M130 528H896M130 614H896M130 700H896"/>
      <path d="M170 132V892M256 132V892M342 132V892M428 132V892M514 132V892M600 132V892M686 132V892M772 132V892M858 132V892"/>
