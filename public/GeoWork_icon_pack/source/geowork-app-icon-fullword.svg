<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="GeoWork app icon">
  <defs>
    <linearGradient id="bg" x1="112" y1="72" x2="910" y2="948" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#091427"/>
      <stop offset="0.42" stop-color="#0B3446"/>
      <stop offset="0.72" stop-color="#083A3A"/>
      <stop offset="1" stop-color="#05070F"/>
    </linearGradient>
    <radialGradient id="globeFill" cx="42%" cy="24%" r="76%">
      <stop offset="0" stop-color="#D6FFF6" stop-opacity="0.32"/>
      <stop offset="0.44" stop-color="#23D5C1" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#0B1728" stop-opacity="0.18"/>
    </radialGradient>
    <linearGradient id="lineGrad" x1="306" y1="242" x2="748" y2="646" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8FFFE3"/>
      <stop offset="0.54" stop-color="#39D9FF"/>
      <stop offset="1" stop-color="#F2D680"/>
    </linearGradient>
    <linearGradient id="geoText" x1="250" y1="718" x2="768" y2="840" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8BFFE2"/>
      <stop offset="0.48" stop-color="#E7FFFA"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="round">
      <rect x="56" y="56" width="912" height="912" rx="214"/>
    </clipPath>
  </defs>

  <rect x="56" y="56" width="912" height="912" rx="214" fill="url(#bg)" filter="url(#shadow)"/>
  <g clip-path="url(#round)">
