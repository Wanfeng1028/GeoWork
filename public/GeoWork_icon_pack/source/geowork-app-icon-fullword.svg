  <!-- Product name included as requested -->
  <g>
    <text x="512" y="784" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="113" font-weight="850" letter-spacing="-4" fill="url(#geoText)">GeoWork</text>
