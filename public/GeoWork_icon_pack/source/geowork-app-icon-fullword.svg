    <path d="M332 522C403 462 458 471 502 398C539 338 599 300 684 318" fill="none" stroke="#5CF1D5" stroke-width="16" opacity="0.42" stroke-linecap="round"/>
    <path d="M357 306C425 342 476 332 540 286C591 249 640 251 690 281C682 322 653 363 602 377C544 394 506 373 465 406C423 440 388 448 342 427C319 383 325 339 357 306z" fill="#58F2C9" opacity="0.34"/>
